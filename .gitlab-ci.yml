image: node:20

stages:
  - lint
  - scan
  - test
  - build
  - deploy

# Cache node_modules basé sur le lockfile
cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

# ─────────────────────────────────────────
# STAGE: lint
# ─────────────────────────────────────────
lint:
  stage: lint
  script:
    - npm ci
    - npm run lint
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev|features\/.*)$/'

# ─────────────────────────────────────────
# STAGE: scan
# ─────────────────────────────────────────
npm_audit:
  stage: scan
  script:
    - npm ci
    - npm audit --audit-level=high || true
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev|features\/.*)$/'

security_scan:
  stage: scan
  image: aquasec/trivy:latest
  # Pas de cache node_modules ici (image différente)
  cache: []
  script:
    - trivy filesystem --exit-code 0 --severity HIGH,CRITICAL --no-progress .
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev|features\/.*)$/'

docker_scan:
  stage: scan
  image: docker:24.0-dind
  services:
    - docker:24.0-dind
  cache: []
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Installer trivy dans l'image docker:dind
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker build -t wakkany:latest .
    - trivy image --exit-code 0 --severity HIGH,CRITICAL --no-progress wakkany:latest
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev|features\/.*)$/'

# ─────────────────────────────────────────
# STAGE: test
# ─────────────────────────────────────────
test:
  stage: test
  needs:
    - lint
    - npm_audit
    - security_scan
    - docker_scan
  script:
    - npm ci
    - npm run test
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev|features\/.*)$/'

# ─────────────────────────────────────────
# STAGE: build
# ─────────────────────────────────────────
build:
  stage: build
  needs:
    - test
  script:
    - npm ci
    - export VITE_BASE_URL="/${CI_PROJECT_NAME}/"
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^(main|dev)$/'

# ─────────────────────────────────────────
# STAGE: deploy
# ─────────────────────────────────────────
pages:
  stage: deploy
  needs:
    - build
  script:
    - mkdir -p public
    - cp -r dist/. public/
  artifacts:
    paths:
      - public/
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
