image: node:20

stages:
  - lint
  - test
  - build
  - deploy
  - scan

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint
  only:
    - main
    - dev
    - /^features\/.*$/

npm_audit:
  stage: test
  script:
    - npm ci
    - npm audit --audit-level=high
  only:
    - main
    - dev
    - /^features\/.*$/

security_scan:
  stage: test
  image: aquasec/trivy:latest
  script:
    - trivy filesystem --exit-code 1 --severity HIGH,CRITICAL .
  only:
    - main
    - dev
    - /^features\/.*$/

docker_scan:
  stage: scan
  image: docker:20.10.16-dind
  services:
    - docker:20.10.16-dind
  variables:
    DOCKER_DRIVER: overlay2
  script:
    - docker build -t wakkany:latest .
    - trivy image --exit-code 1 --severity HIGH,CRITICAL wakkany:latest
  only:
    - main
    - dev
    - /^features\/.*$/

test:
  stage: test
  needs:
    - lint
    - npm_audit
    - security_scan
    - docker_scan
  script:
    - npm install
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

build:
  stage: build
  needs:
    - test
  script:
    - npm install
    - export VITE_BASE_PATH="/${CI_PROJECT_NAME}/"
    - npm run build
  artifacts:
    paths:
      - dist
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

pages:
  stage: deploy
  needs:
    - build
  script:
    - mkdir -p public
    - cp -r dist/. public/
  artifacts:
    paths:
      - public
  rules:
    - when: on_success

verify_pages:
  stage: deploy
  needs:
    - pages
  script:
    - echo "Waiting for pages to be published..."
    - sleep 30
    - URL="https://${CI_PROJECT_NAMESPACE}.gitlab.io/${CI_PROJECT_NAME}/"
    - echo "Testing $URL"
    - curl -f -L $URL || exit 1
