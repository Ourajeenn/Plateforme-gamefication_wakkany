image: node:20

stages:
  - lint
  - test
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

test:
  stage: test
  needs:
    - lint
  script:
    - npm ci
    - npm run test
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

build:
  stage: build
  needs:
    - test
  script:
    - npm ci
    - export VITE_BASE_PATH="/${CI_PROJECT_NAME}/"
    - npm run build
  artifacts:
    paths:
      - dist
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"

pages:
  stage: deploy
  needs:
    - build
  script:
    - mkdir -p public
    - cp -r dist/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
    - if: $CI_COMMIT_BRANCH == "dev"
      when: manual
