server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité HTTP
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    
    # Content Security Policy - Optimisée pour Supabase, Iconify et PostImg
    add_header Content-Security-Policy "default-src 'self'; \
      img-src 'self' data: https: blob:; \
      script-src 'self' 'wasm-unsafe-eval' 'wasm-unsafe-setup' https://*.iconify.design; \
      style-src 'self' 'unsafe-inline'; \
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.iconify.design; \
      font-src 'self' data:; \
      frame-ancestors 'self'; \
      form-action 'self';" always;

    # HSTS (à activer en HTTPS)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Fallback pour le SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
