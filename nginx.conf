server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # En-têtes de sécurité HTTP
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    
    # Content Security Policy - Optimisée
    add_header Content-Security-Policy "default-src 'self'; \
      img-src 'self' data: https: blob:; \
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.iconify.design; \
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://*.iconify.design https://player.mux.com; \
      frame-src https://player.mux.com; \
      font-src 'self' data: https://fonts.gstatic.com; \
      frame-ancestors 'none'; \
      form-action 'self';" always;

    # HSTS (activé en HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Fallback pour le SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
