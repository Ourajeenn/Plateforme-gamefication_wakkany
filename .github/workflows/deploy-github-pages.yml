name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - dev
      - 'features/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint

  npm_audit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (high severity)
        run: npm audit --audit-level=high

  security_scan:
    runs-on: ubuntu-latest
    needs: lint
    container:
      image: aquasec/trivy:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Scan repository for vulnerabilities
        run: |
          trivy filesystem --exit-code 1 --severity HIGH,CRITICAL .

  docker_scan:
    runs-on: ubuntu-latest
    needs: [lint, npm_audit, security_scan]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: |
          docker build -t wakkany:latest .
      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wakkany:latest
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

  test:
    runs-on: ubuntu-latest
    needs: [lint, npm_audit, security_scan, docker_scan]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build for GitHub Pages
        env:
          VITE_BASE_PATH: /Plateforme-gamefication_wakkany/
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: true
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2

  verify_deploy:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for site to become available
        run: |
          echo "Waiting for deployment..."
          sleep 30
      - name: Test deployed site
        run: |
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Testing $URL"
          curl -f -L $URL || exit 1
