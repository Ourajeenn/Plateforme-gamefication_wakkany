name: CI/CD - Build, Security & Deploy

# CORRECTIF : l'ancien découpage en deux fichiers (deploy-github-pages.yml
# et deploy-vercel.yml) ne fonctionnait pas : deploy-vercel.yml déclarait
# `needs: [test, build]` en référençant des jobs définis dans l'AUTRE
# fichier. GitHub Actions ne supporte pas les dépendances inter-workflows
# de cette façon (needs ne fonctionne qu'au sein d'un même workflow) :
# le job vercel_deploy échouait donc systématiquement à l'étape
# "download-artifact" (aucun artefact nommé "artifact" n'existe, l'upload
# se faisait via upload-pages-artifact dans l'autre fichier, qui produit
# un artefact Pages, pas un artefact générique téléchargeable).
# On fusionne donc tout en un seul pipeline avec une chaîne de jobs
# explicite et un seul artefact de build phares par les deux déploiements.

on:
  push:
    branches:
      - main
      - dev
      - 'features/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------------
  # Qualité de code
  # ---------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  # ---------------------------------------------------------------------
  # Sécurité — secrets, audit npm, scan filesystem
  # ---------------------------------------------------------------------
  secret_scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Scan des secrets potentiels
         # note: using command prefix rather than custom tool action
        run: npm run security:scan

  npm_audit:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # NOTE : audit-level=high (et non "moderate || true" comme dans
      # l'ancien script npm "security:audit") pour que le pipeline échoue
      # réellement sur une vulnérabilité haute/critique au lieu de
      # toujours réussir ("|| true" annulait l'audit).
      - run: npm audit --audit-level=high

  fs_security_scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Scan du dépôt avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

  # ---------------------------------------------------------------------
  # Tests
  # ---------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    needs: [secret_scan, npm_audit, fs_security_scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test

  # ---------------------------------------------------------------------
  # Build — un seul artefact réutilisé par les deux déploiements
  # ---------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Build (chemin de base GitHub Pages)
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build
      # Artefact générique téléchargeable par d'autres jobs (Vercel)
      - uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist
          retention-days: 7
      # Artefact spécifique au format attendu par actions/deploy-pages
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  # ---------------------------------------------------------------------
  # Scan de l'image Docker (après un build réussi, avant tout déploiement)
  # ---------------------------------------------------------------------
  docker_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build de l'image Docker
        run: docker build -t wakkany:ci .
      - name: Scan de l'image avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: wakkany:ci
          exit-code: '1'
          severity: 'HIGH,CRITICAL'

  # ---------------------------------------------------------------------
  # Déploiement GitHub Pages — uniquement sur main, jamais sur PR
  # ---------------------------------------------------------------------
  deploy_github_pages:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build, docker_scan]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify_github_pages:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: deploy_github_pages
    steps:
      - name: Attente de propagation
        run: sleep 30
      - name: Vérification du site déployé
        run: |
          URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "Test de $URL"
          curl -f -L "$URL" || exit 1

  # ---------------------------------------------------------------------
  # Déploiement Vercel — uniquement sur main, jamais sur PR
  # CORRECTIF : récupère désormais le build via l'artefact "dist-build"
  # généré par le job `build` de CE MÊME workflow, au lieu de dépendre
  # d'un artefact d'un autre fichier qui n'a jamais existé.
  # ---------------------------------------------------------------------
  deploy_vercel:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, docker_scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Récupération du build
        uses: actions/download-artifact@v4
        with:
          name: dist-build
          path: ./dist

      - name: Déploiement sur Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel
          cp vercel.json ./dist/
          vercel deploy ./dist --prod --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" --yes 2>&1 | tee vercel_output.txt
          DEPLOY_URL=$(grep -Eo 'https://[a-zA-Z0-9.-]+\.vercel\.app' vercel_output.txt | tail -1)
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_ENV"

      - name: Vérification du déploiement Vercel
        run: |
          echo "Test de ${{ env.deploy_url }}"
          curl -f -L "${{ env.deploy_url }}" || exit 1
